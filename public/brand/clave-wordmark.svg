<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" fill="none">
  <title>Clave wordmark</title>
  <desc>Transparent amber/yellow wordmark reading Clave, styled as a bold handwritten script logo.</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-20%" width="130%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="7" dy="9" stdDeviation="1.4" flood-color="#9c6b00" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g transform="translate(112 282) rotate(-6)" filter="url(#softShadow)">
    <text
      x="0"
      y="0"
      fill="#c98d13"
      fill-opacity="0.32"
      font-family="'Brush Script MT', 'Snell Roundhand', 'Segoe Script', 'Apple Chancery', cursive"
      font-size="248"
      font-style="normal"
      font-weight="700"
      letter-spacing="-9"
      transform="translate(11 13)"
      paint-order="stroke fill"
      stroke="#c98d13"
      stroke-width="7"
      stroke-linejoin="round"
      stroke-linecap="round"
    >Clave</text>

    <text
      x="0"
      y="0"
      fill="#f5b62e"
      font-family="'Brush Script MT', 'Snell Roundhand', 'Segoe Script', 'Apple Chancery', cursive"
      font-size="248"
      font-style="normal"
      font-weight="700"
      letter-spacing="-9"
      paint-order="stroke fill"
      stroke="#bb7f11"
      stroke-width="5"
      stroke-linejoin="round"
      stroke-linecap="round"
      text-rendering="geometricPrecision"
    >Clave</text>
  </g>
</svg>
